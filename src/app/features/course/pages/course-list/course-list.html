<app-page-header
  [title]="'Courses Management'"
  [subtitle]="'Manage all courses'"
  (addClicked)="addCourse()"
  [name]="'Course'">
</app-page-header>
<app-search-input
  [label]="'Search Course'"
  [placeholder]="'Search by title'"
  (search)="applyFilter($event)">
</app-search-input>
@if(courses()){
<app-data-table
  [displayedColumns]="displayedColumns"
  [data]="courses()"
  (edit)="editCourse($event)"
  (delete)="deleteCourse($event)"
  (view)="viewCourse($event)">
 >
</app-data-table>
}
@else{
  <app-empty-state
    [title]="'No Courses Found'"
    [message]="'There are no courses available yet'">
  </app-empty-state>
}
